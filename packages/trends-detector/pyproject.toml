[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trends-detector"
version = "0.1.0"
description = "Velocity + Acceleration trend detection with lifecycle classification"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "Neelmani Vispute", email = "neil.vispute@gmail.com" }]
keywords = ["trends", "anomaly-detection", "time-series", "velocity", "marketing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = []

[project.urls]
Homepage = "https://github.com/neelmanivispute/trends-engine"
Repository = "https://github.com/neelmanivispute/trends-engine"

[tool.hatch.build.targets.wheel]
packages = ["src/trends_detector"]
