[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trends-nlp"
version = "0.1.0"
description = "7-stage NLP enrichment pipeline for social content analysis"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "Neelmani Vispute", email = "neil.vispute@gmail.com" }]
keywords = ["nlp", "sentiment", "embeddings", "topic-modeling", "trends"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Linguistic",
]

dependencies = [
    "vaderSentiment>=3.3",
    "numpy>=1.24",
]

[project.optional-dependencies]
embeddings = ["sentence-transformers>=2.6"]
tfidf = ["scikit-learn>=1.3"]
store = ["trends-store>=0.1.0"]
all = ["sentence-transformers>=2.6", "scikit-learn>=1.3", "trends-store>=0.1.0"]

[project.urls]
Homepage = "https://github.com/neelmanivispute/trends-engine"
Repository = "https://github.com/neelmanivispute/trends-engine"
Issues = "https://github.com/neelmanivispute/trends-engine/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/trends_nlp"]
