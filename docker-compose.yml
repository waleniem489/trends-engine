version: "3.9"

services:
  # ── Vector Store ──
  qdrant:
    image: qdrant/qdrant:v1.8.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── Cache ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Email Delivery (self-hosted) ──
  listmonk:
    image: listmonk/listmonk:latest
    ports:
      - "9000:9000"
    environment:
      - TZ=UTC
    depends_on:
      - listmonk-db
    volumes:
      - listmonk_uploads:/listmonk/uploads

  listmonk-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk
      POSTGRES_DB: listmonk
    volumes:
      - listmonk_db:/var/lib/postgresql/data

  # ── Local LLM (optional — comment out if using cloud LLMs) ──
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]

volumes:
  qdrant_data:
  redis_data:
  listmonk_uploads:
  listmonk_db:
  # ollama_data:
